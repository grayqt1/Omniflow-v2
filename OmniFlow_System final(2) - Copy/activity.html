<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniFlow — Activity</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .pill-filter {
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      color: var(--ink-2);
    }

    .pill-filter.active {
      background: var(--blue-soft);
      color: var(--blue);
      border-color: var(--blue-mid, var(--border));
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .activity-row {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .act-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .act-msg {
      font-size: 13px;
      font-weight: 600;
    }

    .act-time {
      font-size: 12px;
      color: var(--ink-3);
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round">
          <polygon
            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
      </div>
      <span class="logo-text">Omni<span>Flow</span></span>
    </div>
    <nav>
      <div class="nav-label">Main</div>
      <a class="nav-item" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>Home</a>
      <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>Dashboard</a>
      <div class="nav-divider"></div>
      <div class="nav-label">Operations</div>
      <a class="nav-item" href="orders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>Order Management</a>
      <a class="nav-item" href="clients.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
        </svg>Client List</a>
      <a class="nav-item" href="production.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>Production</a>
      <a class="nav-item" href="inventory.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
        </svg>Inventory</a>
      <div class="nav-divider"></div>
      <div class="nav-label">Insights</div>
      <a class="nav-item" href="reports.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>Reports</a>
      <a class="nav-item active" href="activity.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
        </svg>Activity</a>
      <div class="nav-divider"></div>
      <a class="nav-item" href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
        </svg>Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar" id="user-avatar"></div>
      <div>
        <div class="user-name" id="user-name">—</div>
        <div class="user-role" id="user-role">—</div>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar-title">Activity</span>
    </header>
    <main class="content">
      <div class="page-header">
        <div class="page-title">Activity Feed</div>
        <div class="page-sub">All system events. Filter by type.</div>
      </div>

      <div class="filter-bar">
        <button class="pill-filter active" data-type="" onclick="setFilter(this)">All</button>
        <button class="pill-filter" data-type="success" onclick="setFilter(this)">Success</button>
        <button class="pill-filter" data-type="info" onclick="setFilter(this)">Info</button>
        <button class="pill-filter" data-type="warning" onclick="setFilter(this)">Warning</button>
      </div>

      <div class="activity-list" id="activity-list">
        <div class="empty">Loading…</div>
      </div>
    </main>
  </div>

  <script>
    const typeColor = { success: '#22C55E', info: '#3B82F6', warning: '#F59E0B', default: '#94A3B8' };
    let activities = [];
    let filterType = '';

    function render() {
      const list = document.getElementById('activity-list');
      const filtered = filterType ? activities.filter(a => a.type === filterType) : activities;
      if (!filtered.length) { list.innerHTML = '<div class="empty">No activity.</div>'; return; }
      list.innerHTML = filtered.map(a => `
      <div class="activity-row">
        <div class="act-dot" style="background:${typeColor[a.type] || typeColor.default}"></div>
        <div>
          <div class="act-msg">${a.message}</div>
          <div class="act-time">${a.timestamp}</div>
        </div>
      </div>`).join('');
    }

    function setFilter(btn) {
      document.querySelectorAll('.pill-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterType = btn.dataset.type;
      render();
    }

    // CSRF helper
    let csrfToken = null;
    function getCookie(name){ return document.cookie.split('; ').find(r => r.startsWith(name+'='))?.split('=')[1]; }
    function ensureCsrf(){
      if (csrfToken) return Promise.resolve(csrfToken);
      return fetch('/api/csrf')
        .then(r => r.json())
        .then(j => { csrfToken = getCookie('XSRF-TOKEN') || j.csrf_token; return csrfToken; });
    }
    function csrfFetch(url, opts={}){ return ensureCsrf().then(tok=>{ opts.headers=Object.assign({'X-CSRF-Token':tok}, opts.headers||{}); return fetch(url, opts);}); }

    fetch('/api/activity')
      .then(r => r.json())
      .then(data => { activities = data; render(); });

    // Set sidebar user
    (function loadUser() {
      fetch('/api/me').then(r => r.json()).then(me => {
        const n = document.getElementById('user-name');
        const ro = document.getElementById('user-role');
        const av = document.getElementById('user-avatar');
        if (n) n.textContent = me.name || '—';
        if (ro) ro.textContent = me.role || '—';
        if (av) av.textContent = (me.name || '—').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      });
    })();

    function logout() {
      csrfFetch('/api/logout', { method: 'POST' }).then(() => window.location = '/login');
    }
  </script>
</body>

</html>
