<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniFlow — Orders</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; height: 36px; }
    .search-box input { border: none; outline: none; font-size: 13px; font-family: inherit; width: 100%; background: transparent; color: var(--ink); }
    .search-box svg { width: 14px; height: 14px; color: var(--ink-3); flex-shrink: 0; }
    select { height: 36px; padding: 0 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--ink); outline: none; cursor: pointer; }
    .btn { height: 36px; padding: 0 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: #265fd4; }
    .btn-secondary { background: var(--surface); color: var(--ink-2); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .btn svg { width: 14px; height: 14px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 5px; }
    input[type=text], input[type=number], input[type=date], textarea, select.full { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; background: var(--bg); color: var(--ink); }
    input[type=text]:focus, input[type=number]:focus, input[type=date]:focus, textarea:focus, select.full:focus { border-color: var(--blue); background: var(--surface); }
    textarea { resize: vertical; min-height: 80px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

    .row-actions { display: flex; gap: 6px; }
    .row-btn { font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; }
    .row-edit { background: var(--blue-soft); color: var(--blue); }
    .row-del  { background: #FEE2E2; color: #DC2626; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <span class="logo-text">Omni<span>Flow</span></span>
  </div>
  <nav>
    <div class="nav-label">Main</div>
    <a class="nav-item" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <div class="nav-divider"></div>
    <div class="nav-label">Operations</div>
    <a class="nav-item active" href="orders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Order Management</a>
    <a class="nav-item" href="clients.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Client List</a>
    <a class="nav-item" href="production.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Production</a>
    <a class="nav-item" href="inventory.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Inventory</a>
    <div class="nav-divider"></div>
    <div class="nav-label">Insights</div>
    <a class="nav-item" href="reports.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reports</a>
    <a class="nav-item" href="activity.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Activity</a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a>
  </nav>
  <div class="sidebar-footer">
    <div class="avatar" id="user-avatar"></div>
    <div><div class="user-name" id="user-name">—</div><div class="user-role" id="user-role">—</div></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <header class="topbar">
    <span class="topbar-title">Orders</span>
  </header>

  <main class="content">
    <div class="page-header">
      <div class="page-title">Orders</div>
      <div class="page-sub">All orders from database</div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search orders or clients…" oninput="filterOrders()" />
      </div>
      <!-- Filter by status — values from /api/orders -->
      <select id="filter-status" onchange="filterOrders()">
        <option value="">All Status</option>
        <option value="in-progress">In Progress</option>
        <option value="pending">Pending</option>
        <option value="done">Completed</option>
        <option value="queued">Queued</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <button id="new-order-btn" class="btn btn-primary" onclick="openModal()" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Order
      </button>
    </div>

    <!-- Orders Table — from /api/orders -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Client</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Due Date</th>
            <th id="orders-actions-header" style="display:none">Actions</th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr><td colspan="8" class="empty">Loading orders…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Add/Edit Order Modal -->
<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Order</div>
    <div class="form-group">
      <label>Client</label>
      <select class="full" id="f-client"><option value="">Select client…</option></select>
    </div>
    <div class="form-group">
      <label>Product / Description</label>
      <input type="text" id="f-product" placeholder="e.g. Custom Frame Set x10" />
    </div>
    <div class="form-group">
      <label>Quantity</label>
      <input type="text" id="f-qty" placeholder="e.g. 20" />
    </div>
    <div class="form-group">
      <label>Amount (total)</label>
      <input type="number" id="f-amount" placeholder="e.g. 120000" step="0.01" />
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input type="date" id="f-due" />
    </div>
    <div class="form-group">
      <label>Status</label>
      <select class="full" id="f-status">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="queued">Queued</option>
        <option value="done">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Optional notes…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveOrder()">Save Order</button>
    </div>
  </div>
</div>

<script>
  let editId = null;
  let orderPerms = { create: false, update: false, delete: false };

  function applyOrderPermissions() {
    const newOrderBtn = document.getElementById('new-order-btn');
    if (newOrderBtn) {
      newOrderBtn.style.display = orderPerms.create ? 'inline-flex' : 'none';
    }
    const actionsHeader = document.getElementById('orders-actions-header');
    if (actionsHeader) {
      actionsHeader.style.display = (orderPerms.update || orderPerms.delete) ? '' : 'none';
    }
  }

  function loadOrderPermissions() {
    return fetch('/api/me').then(r => r.json()).then(me => {
      return fetch('/api/settings/permissions').then(r => r.json()).then(perms => {
        const role = (me.role || '').trim();
        const rolePerms = perms[role] || {};
        const orderRole = rolePerms.orders || {};
        orderPerms = {
          create: !!orderRole.create,
          update: !!orderRole.update,
          delete: !!orderRole.delete,
        };
        // if no explicit config and user is manager/admin, allow by default
        if (!Object.keys(rolePerms).length && (role.toLowerCase() === 'admin' || role.toLowerCase().includes('manager'))) {
          orderPerms = { create: true, update: true, delete: true };
        }
        applyOrderPermissions();
      });
    }).catch(() => {});
  }

  function openModal(orderId) {
    editId = orderId || null;
    document.getElementById('modal-title').textContent = orderId ? 'Edit Order' : 'New Order';
    ['f-client','f-product','f-qty','f-amount','f-due','f-status','f-notes'].forEach(id => {
      if (id === 'f-status') document.getElementById(id).value = 'pending';
      else document.getElementById(id).value = '';
    });
    if (orderId) {
      fetch('/api/orders/' + orderId)
        .then(r => r.json())
        .then(o => {
          document.getElementById('f-client').value  = o.client_id || '';
          document.getElementById('f-product').value = o.product || '';
          document.getElementById('f-qty').value     = o.qty ?? '';
          document.getElementById('f-amount').value  = o.amount ?? '';
          document.getElementById('f-due').value     = o.due_date || '';
          document.getElementById('f-status').value  = o.status || 'pending';
          document.getElementById('f-notes').value   = o.notes || '';
        });
    }
    document.getElementById('order-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('order-modal').classList.remove('open');
    editId = null;
  }

  // CSRF helper for all mutating API calls
  let csrfToken = null;
  function getCookie(name){ return document.cookie.split('; ').find(r => r.startsWith(name+'='))?.split('=')[1]; }
  function ensureCsrf(){
    if (csrfToken) return Promise.resolve(csrfToken);
    return fetch('/api/csrf')
      .then(r => r.json())
      .then(j => { csrfToken = getCookie('XSRF-TOKEN') || j.csrf_token; return csrfToken; });
  }
  function csrfFetch(url, opts={}){ return ensureCsrf().then(tok=>{ opts.headers = Object.assign({'X-CSRF-Token':tok}, opts.headers||{}); opts.credentials = opts.credentials || 'same-origin'; return fetch(url, opts);}); }

  function saveOrder() {
    const payload = {
      client_id: document.getElementById('f-client').value,
      product: document.getElementById('f-product').value,
      qty: document.getElementById('f-qty').value,
      amount: document.getElementById('f-amount').value,
      due_date: document.getElementById('f-due').value,
      status: document.getElementById('f-status').value,
      notes: document.getElementById('f-notes').value,
    };
    const url = editId ? '/api/orders/' + editId : '/api/orders';
    const method = editId ? 'PUT' : 'POST';
    csrfFetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
      .then(r => { if (!r.ok) throw new Error('save_failed'); closeModal(); loadOrders(); })
      .catch(() => alert('Could not save order. Please try again.'));
  }

  function deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    csrfFetch('/api/orders/' + id, { method: 'DELETE' })
      .then(r => { if (!r.ok) throw new Error(); loadOrders(); })
      .catch(() => alert('Could not delete order. Please try again.'));
  }

  const pillClass = { 'done':'pill-green', 'in-progress':'pill-blue', 'pending':'pill-amber', 'queued':'pill-gray', 'cancelled':'pill-gray' };
  const pillLabel = { 'done':'Completed', 'in-progress':'In Progress', 'pending':'Pending', 'queued':'Queued', 'cancelled':'Cancelled' };

  function renderOrders(orders) {
    const tbody = document.getElementById('orders-tbody');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">No orders found.</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => {
      const editButton = orderPerms.update ? `<button class="row-btn row-edit" onclick="openModal('${o.id}')">Edit</button>` : '';
      const deleteButton = orderPerms.delete ? `<button class="row-btn row-del" onclick="deleteOrder('${o.id}')">Delete</button>` : '';
      const actions = [editButton, deleteButton].filter(Boolean).join('') || '<span class="mono">—</span>';
      return `
        <td class="mono">${o.id}</td>
        <td>${o.client_name}</td>
        <td>${o.product}</td>
        <td>${o.qty}</td>
        <td class="mono">₱${Number(o.amount || 0).toLocaleString()}</td>
        <td><span class="pill ${pillClass[o.status]}">${pillLabel[o.status]}</span></td>
        <td>${o.due_date}</td>
        <td>
          <div class="row-actions">${actions}</div>
        </td>
      </tr>`;
    }).join('');
  }

  function filterOrders() {
    const q      = document.getElementById('search-input').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    fetch(`/api/orders?search=${q}&status=${status}`).then(r => r.json()).then(renderOrders);
  }

  function loadOrders() {
    loadOrderPermissions().then(() => {
      fetch('/api/orders').then(r => r.json()).then(renderOrders);
    });
    // populate client select for modal
    fetch('/api/clients').then(r => r.json()).then(clients => {
      document.getElementById('f-client').innerHTML = '<option value="">Select client…</option>' +
        clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    });
  }

  loadOrders();

  // Set sidebar user
  (function loadUser() {
    fetch('/api/me').then(r => r.json()).then(me => {
      const n = document.getElementById('user-name');
      const ro = document.getElementById('user-role');
      const av = document.getElementById('user-avatar');
      if (n) n.textContent = me.name || '—';
      if (ro) ro.textContent = me.role || '—';
      if (av) av.textContent = (me.name || '—').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    });
  })();

  function logout() { csrfFetch('/api/logout', { method: 'POST' }).then(() => window.location = '/login'); }
</script>
</body>
</html>
